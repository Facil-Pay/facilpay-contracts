name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install Stellar CLI
        run: curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --dir ~/.cargo/bin

      - name: Format Check
        run: cargo fmt --check

      - name: Clippy Lints
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test --workspace

      - name: Build Contracts
        run: stellar contract build

      - name: Check WASM Binary Sizes
        run: |
          MAX_SIZE=262144
          for wasm in target/wasm32v1-none/release/*.wasm; do
            size=$(wc -c < "$wasm")
            [ "$size" -le "$MAX_SIZE" ] || (echo "$wasm is too large: $size bytes (limit: $MAX_SIZE)" && exit 1)
          done
